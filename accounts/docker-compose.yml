services:
  accounts:
    image: "gauravsingh010/accounts:s4"
    container_name: accounts-ms
    ports:
      - "8000:8000"
    deploy:
      resources:
        limits:
          memory: 700m
    networks:
      - gaurav

  cards:
    image: "gauravsingh010/cards:s4"
    container_name: cards-ms
    ports:
      - "8001:8001"
    deploy:
      resources:
        limits:
          memory: 700m
    networks:
      - gaurav

  loans:
    image: "gauravsingh010/loans:s4"
    container_name: loans-ms
    ports:
      - "8002:8002"
    deploy:
      resources:
        limits:
          memory: 700m
    networks:
      - gaurav

networks:
  gaurav:
    driver: "bridge"