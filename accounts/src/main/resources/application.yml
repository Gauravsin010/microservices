spring:
  application:
    name: "accounts"
  profiles:
    active: "qa"

  config:
    import: "${SPRING_CONFIG_IMPORT:optional:configserver:http://localhost:8071}"


  datasource:
    url: jdbc:mysql://localhost:3306/accountsdb
    username: root
    password: root

  jpa:
    show-sql: true
  sql:
    init:
      mode: always

server:
  port: 8000

management:
  endpoints:
    web:
      exposure:
        include: "*"

