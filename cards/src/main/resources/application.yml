spring:
  profiles:
    active: "prod"

  application:
    name: "cards"

  config:
    import: "configserver:http://localhost:8071"

  datasource:
    url: jdbc:h2:mem:testdb
    driverClassName: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: validate
    show-sql: true

server:
  port: 8001