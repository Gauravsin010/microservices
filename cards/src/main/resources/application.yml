spring:
  profiles:
    active: "prod"

  application:
    name: "cards"

  config:
    import: "${SPRING_CONFIG_IMPORT:optional:configserver:http://localhost:8071}"

  datasource:
    url: jdbc:mysql://localhost:3308/cardsdb
    username: root
    password: root

  jpa:
    show-sql: true
  sql:
    init:
      mode: always

server:
  port: 8001

management:
  endpoints:
    web:
      exposure:
        include: "*"