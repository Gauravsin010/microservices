spring:
  profiles:
    active: "prod"

  application:
    name: "cards"

  config:
    import: "${SPRING_CONFIG_IMPORT:optional:configserver:http://localhost:8071}"

  datasource:
    url: jdbc:h2:mem:testdb
    driverClassName: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: validate
    show-sql: true
  rabbitmq:
    host: "localhost"
    port: 5672
    username: "guest"
    password: "guest"

server:
  port: 8001

management:
  endpoints:
    web:
      exposure:
        include: "*"